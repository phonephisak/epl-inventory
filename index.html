<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EPL System — ເຂົ້າສູ່ລະບົບ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans Lao', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; }

    .login-left {
      flex: 1;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    .login-left::before {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: rgba(255,255,255,0.03);
      border-radius: 50%;
      top: -100px; right: -100px;
    }

    .login-left::after {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      background: rgba(255,255,255,0.03);
      border-radius: 50%;
      bottom: -80px; left: -80px;
    }

    .brand-logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #875BF7, #6938EF);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(105,56,239,0.4);
      position: relative; z-index: 1;
    }

    .brand-name { font-size: 32px; font-weight: 700; color: white; letter-spacing: 2px; margin-bottom: 8px; position: relative; z-index: 1; }
    .brand-sub { font-size: 14px; color: rgba(255,255,255,0.5); position: relative; z-index: 1; }

    .brand-features { margin-top: 48px; position: relative; z-index: 1; }
    .feature-item { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; color: rgba(255,255,255,0.7); font-size: 13px; }
    .feature-icon { width: 32px; height: 32px; background: rgba(255,255,255,0.08); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }

    .login-right {
      width: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: white;
    }

    .login-form { width: 100%; }
    .form-title { font-size: 24px; font-weight: 700; color: #1e293b; margin-bottom: 6px; }
    .form-sub { font-size: 13px; color: #64748b; margin-bottom: 32px; }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 7px; }

    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; color: #94a3b8; }
    input {
      width: 100%;
      padding: 12px 12px 12px 40px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      color: #1e293b;
      font-family: 'Noto Sans Lao', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.15s;
      background: #f8fafc;
    }
    input:focus { border-color: #6938EF; background: white; box-shadow: 0 0 0 3px rgba(105,56,239,0.1); }
    input::placeholder { color: #94a3b8; }

    .alert { padding: 11px 14px; border-radius: 9px; font-size: 13px; margin-bottom: 16px; display: none; }
    .alert.error { background: #fee2e2; border: 1px solid #fca5a5; color: #dc2626; display: block; }
    .alert.success { background: #dcfce7; border: 1px solid #86efac; color: #16a34a; display: block; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #875BF7, #6938EF);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: 'Noto Sans Lao', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(105,56,239,0.35);
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(105,56,239,0.4); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-text { text-align: center; font-size: 12px; color: #94a3b8; margin-top: 24px; }

    @media (max-width: 768px) {
      .login-left { display: none; }
      .login-right { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="login-left">
    <div class="brand-logo">🏭</div>
    <div class="brand-name">EPL SYSTEM</div>
    <div class="brand-sub">ລະບົບຈັດການໂຮງງານ</div>

    <div class="brand-features">
      <div class="feature-item">
        <div class="feature-icon">📊</div>
        Dashboard & KPI Reports
      </div>
      <div class="feature-item">
        <div class="feature-icon">📦</div>
        Stock Management
      </div>
      <div class="feature-item">
        <div class="feature-icon">📅</div>
        Production Planning
      </div>
      <div class="feature-item">
        <div class="feature-icon">❌</div>
        NG / Defect Tracking
      </div>
      <div class="feature-item">
        <div class="feature-icon">🔐</div>
        Role-Based Access Control
      </div>
    </div>
  </div>

  <div class="login-right">
    <div class="login-form">
      <div class="form-title">ຍິນດີຕ້ອນຮັບ 👋</div>
      <div class="form-sub">ກະລຸນາ Login ເພື່ອເຂົ້າໃຊ້ລະບົບ</div>

      <div id="alert" class="alert"></div>

      <div class="form-group">
        <label class="form-label">ຊື່ຜູ້ໃຊ້</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="username" placeholder="ກະລຸນາໃສ່ຊື່ຜູ້ໃຊ້" autocomplete="off"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">ລະຫັດຜ່ານ</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="ກະລຸນາໃສ່ລະຫັດຜ່ານ"/>
        </div>
      </div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()">ເຂົ້າສູ່ລະບົບ</button>

      <div class="footer-text">EPL System v1.0 © 2025</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBq3ty0rw70wGE_QxwOe3SczEfXViWxx98",
      authDomain: "epl-inventory.firebaseapp.com",
      projectId: "epl-inventory",
      storageBucket: "epl-inventory.firebasestorage.app",
      messagingSenderId: "345481661658",
      appId: "1:345481661658:web:60bef5a2eafdf3060829"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    if (sessionStorage.getItem('epl_user')) window.location.href = 'home.html';

    window.handleLogin = async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn = document.getElementById('loginBtn');
      const alertEl = document.getElementById('alert');

      alertEl.className = 'alert';
      alertEl.textContent = '';

      if (!username || !password) {
        alertEl.className = 'alert error';
        alertEl.textContent = '⚠️ ກະລຸນາໃສ່ຊື່ຜູ້ໃຊ້ ແລະ ລະຫັດຜ່ານ';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> ກຳລັງເຂົ້າລະບົບ...';

      try {
        const q = query(collection(db, 'users'), where('username', '==', username));
        const snap = await getDocs(q);

        if (snap.empty) throw new Error('ບໍ່ພົບຊື່ຜູ້ໃຊ້ນີ້');

        const userDoc = snap.docs[0];
        const userData = userDoc.data();

        await signInWithEmailAndPassword(auth, userData.email, password);

        sessionStorage.setItem('epl_user', JSON.stringify({
          id: userDoc.id,
          username: userData.username,
          name: userData.name,
          role: userData.role,
          department: userData.department,
          permissions: userData.permissions || {},
          departmentAccess: userData.departmentAccess || {}
        }));

        alertEl.className = 'alert success';
        alertEl.textContent = '✅ ເຂົ້າລະບົບສຳເລັດ!';
        setTimeout(() => window.location.href = 'home.html', 600);

      } catch(err) {
        alertEl.className = 'alert error';
        alertEl.textContent = '❌ ' + (err.message.includes('ບໍ່ພົບ') ? err.message : 'ຊື່ຜູ້ໃຊ້ ຫຼື ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ');
        btn.disabled = false;
        btn.innerHTML = 'ເຂົ້າສູ່ລະບົບ';
      }
    };

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
