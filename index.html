<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EPL System — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans Lao', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a7a4a 0%, #0d5c35 40%, #1a9a5a 100%);
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-box {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #1a9a5a, #0d6e40);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 6px 20px rgba(13,110,64,0.3);
    }

    .logo-text {
      font-size: 18px;
      font-weight: 800;
      color: white;
      letter-spacing: 1px;
    }

    .app-name {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .app-sub {
      font-size: 13px;
      color: #1a9a5a;
      font-weight: 500;
    }

    /* LANG TOGGLE */
    .lang-toggle {
      display: flex;
      background: #f1f5f9;
      border-radius: 10px;
      padding: 4px;
      margin: 20px 0 24px;
    }

    .lang-btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      font-family: 'Noto Sans Lao', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: #64748b;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .lang-btn.active {
      background: white;
      color: #1a9a5a;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* FORM */
    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 7px;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-family: 'Noto Sans Lao', sans-serif;
      font-size: 14px;
      color: #1e293b;
      outline: none;
      transition: all 0.15s;
      background: #f8fafc;
    }

    .form-input:focus {
      border-color: #1a9a5a;
      background: white;
      box-shadow: 0 0 0 3px rgba(26,154,90,0.1);
    }

    .form-input::placeholder { color: #94a3b8; }

    .alert {
      padding: 11px 14px;
      border-radius: 9px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }

    .alert.error { background: #fee2e2; border: 1px solid #fca5a5; color: #dc2626; display: block; }
    .alert.success { background: #dcfce7; border: 1px solid #86efac; color: #16a34a; display: block; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1a9a5a, #0d6e40);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: 'Noto Sans Lao', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(13,110,64,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }

    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(13,110,64,0.4); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .loading {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer { text-align: center; font-size: 11px; color: #94a3b8; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo-wrap">
      <div class="logo-box">
        <div class="logo-text">EPL</div>
      </div>
      <div class="app-name">EPL System</div>
      <div class="app-sub" id="appSub">ລະບົບຈັດການໂຮງງານ / Factory Management</div>
    </div>

    <!-- LANG -->
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnLao" onclick="setLang('lo')">🇱🇦 ລາວ</button>
      <button class="lang-btn" id="btnEng" onclick="setLang('en')">🇬🇧 English</button>
    </div>

    <div id="alert" class="alert"></div>

    <div class="form-group">
      <label class="form-label" id="lblUser">ຊື່ຜູ້ໃຊ້ / Username</label>
      <input type="text" class="form-input" id="username" placeholder="Username" autocomplete="off"/>
    </div>

    <div class="form-group">
      <label class="form-label" id="lblPass">ລະຫັດຜ່ານ / Password</label>
      <input type="password" class="form-input" id="password" placeholder="Password"/>
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">
      <span>🔐</span>
      <span id="btnText">ເຂົ້າສູ່ລະບົບ / Login</span>
    </button>

    <div class="footer">EPL System v1.0 © 2025 — Epoch Factory</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBq3ty0rw70wGE_QxwOe3SczEfXViWxx98",
      authDomain: "epl-inventory.firebaseapp.com",
      projectId: "epl-inventory",
      storageBucket: "epl-inventory.firebasestorage.app",
      messagingSenderId: "345481661658",
      appId: "1:345481661658:web:60bef5a2eafdf3060829"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    if (sessionStorage.getItem('epl_user')) window.location.href = 'home.html';

    // Language
    const texts = {
      lo: { user: 'ຊື່ຜູ້ໃຊ້ / Username', pass: 'ລະຫັດຜ່ານ / Password', btn: 'ເຂົ້າສູ່ລະບົບ / Login', err1: '⚠️ ກະລຸນາໃສ່ຊື່ຜູ້ໃຊ້ ແລະ ລະຫັດຜ່ານ', err2: '❌ ຊື່ຜູ້ໃຊ້ ຫຼື ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ', ok: '✅ ເຂົ້າລະບົບສຳເລັດ!' },
      en: { user: 'Username', pass: 'Password', btn: 'Login', err1: '⚠️ Please enter username and password', err2: '❌ Invalid username or password', ok: '✅ Login successful!' }
    };

    let lang = 'lo';

    window.setLang = (l) => {
      lang = l;
      document.getElementById('btnLao').classList.toggle('active', l === 'lo');
      document.getElementById('btnEng').classList.toggle('active', l === 'en');
      document.getElementById('lblUser').textContent = texts[l].user;
      document.getElementById('lblPass').textContent = texts[l].pass;
      document.getElementById('btnText').textContent = texts[l].btn;
    };

    window.handleLogin = async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn = document.getElementById('loginBtn');
      const alertEl = document.getElementById('alert');

      alertEl.className = 'alert';

      if (!username || !password) {
        alertEl.className = 'alert error';
        alertEl.textContent = texts[lang].err1;
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>';

      try {
        const q = query(collection(db, 'users'), where('username', '==', username));
        const snap = await getDocs(q);
        if (snap.empty) throw new Error('not_found');

        const userDoc = snap.docs[0];
        const userData = userDoc.data();

        await signInWithEmailAndPassword(auth, userData.email, password);

        sessionStorage.setItem('epl_user', JSON.stringify({
          id: userDoc.id,
          username: userData.username,
          name: userData.name,
          role: userData.role,
          department: userData.department,
          permissions: userData.permissions || {},
          departmentAccess: userData.departmentAccess || {}
        }));

        alertEl.className = 'alert success';
        alertEl.textContent = texts[lang].ok;
        setTimeout(() => window.location.href = 'home.html', 600);

      } catch(err) {
        alertEl.className = 'alert error';
        alertEl.textContent = texts[lang].err2;
        btn.disabled = false;
        btn.innerHTML = `<span>🔐</span><span>${texts[lang].btn}</span>`;
      }
    };

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
